<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1830" />
    <meta name="referrer" content="no-referrer" />
    <title>Conectando conta Google</title>
    <style>
      *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:22px;color:#edf5ff;background:linear-gradient(145deg,#0d2946,#071522);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.card{width:min(440px,100%);padding:30px;text-align:center;background:rgba(15,39,65,.96);border:1px solid rgba(100,190,238,.32);border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.45)}.mark{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 17px;border-radius:50%;color:#fff;background:conic-gradient(from -45deg,#4285f4 0 25%,#34a853 0 50%,#fbbc05 0 75%,#ea4335 0);font-size:28px;font-weight:900}.card h1{margin:0 0 10px;font-size:25px}.card p{margin:0;color:#a9c2d5;font-size:14px;line-height:1.5}.status{margin-top:18px;padding:12px;border-radius:12px;background:rgba(42,88,122,.48);font-size:13px;font-weight:800}.status.ok{color:#92f0bb;background:rgba(44,146,91,.22)}.status.error{color:#ffadb2;background:rgba(178,59,67,.24)}button{width:100%;min-height:46px;margin-top:16px;color:#092338;background:#73dcff;border:0;border-radius:12px;font-weight:900;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">G</div>
      <h1>Conectando sua conta</h1>
      <p>Assim que o login terminar, volte ao aplicativo Idle Jorneymon.</p>
      <div id="callback-status" class="status">Finalizando o login Google…</div>
      <button id="callback-close" type="button" hidden>Voltar ao aplicativo</button>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth-callback.js?v=20260724-1"></script>
  </body>
</html>
