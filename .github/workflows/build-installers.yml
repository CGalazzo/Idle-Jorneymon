name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - "public/icons/app-icon.svg"
      - "src/ui/install-app.js"
      - "src/styles/install-app.css"
      - "index.html"
      - ".github/workflows/build-installers.yml"
  pull_request:
    branches: [main]
    paths:
      - "android-app/**"
      - "public/icons/app-icon.svg"
      - "src/ui/install-app.js"
      - "src/styles/install-app.css"
      - "index.html"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build simple Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generate valid Android icon
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          mkdir -p android-app/app/src/main/res/drawable
          rsvg-convert --width 512 --height 512 \
            --output android-app/app/src/main/res/drawable/app_icon.png \
            public/icons/app-icon.svg
          file android-app/app/src/main/res/drawable/app_icon.png

      - name: Build release APK
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gradle -p android-app assembleRelease --no-daemon --stacktrace > android-release.log 2>&1
          status=$?
          tail -n 120 android-release.log
          if [ $status -ne 0 ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              {
                echo "### Erro no APK Android simples"
                echo '```text'
                tail -n 90 android-release.log
                echo '```'
              } > android-error.md
              gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body-file android-error.md
            fi
            exit $status
          fi

      - name: Prepare download
        run: |
          cp android-app/app/build/outputs/apk/release/app-release.apk Idle-Jorneymon-Android.apk
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs Idle-Jorneymon-Android.apk
          sha256sum Idle-Jorneymon-Android.apk > Idle-Jorneymon-Android.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: idle-jorneymon-android
          path: |
            Idle-Jorneymon-Android.apk
            Idle-Jorneymon-Android.sha256
          if-no-files-found: error

  publish:
    name: Publish Android download
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: idle-jorneymon-android
          path: release

      - name: Publish fixed APK link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view app-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit app-latest --repo "$GITHUB_REPOSITORY" \
              --title "Idle Jorneymon - APK Android" \
              --notes "APK Android simples que abre a versão atual do jogo."
          else
            gh release create app-latest --repo "$GITHUB_REPOSITORY" --target main \
              --title "Idle Jorneymon - APK Android" \
              --notes "APK Android simples que abre a versão atual do jogo."
          fi

          gh release delete-asset app-latest Idle-Jorneymon-Windows-Setup.exe --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release delete-asset app-latest Idle-Jorneymon-Windows-Setup.exe.blockmap --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release upload app-latest \
            release/Idle-Jorneymon-Android.apk \
            release/Idle-Jorneymon-Android.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
