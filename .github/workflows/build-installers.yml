name: Build downloadable apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/prepare-packaged-build.mjs"
      - "scripts/generate-app-icons.py"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "android-app/**"
      - "desktop-app/**"
      - ".github/workflows/build-installers.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/prepare-packaged-build.mjs"
      - "scripts/generate-app-icons.py"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "android-app/**"
      - "desktop-app/**"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: downloadable-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python scripts/generate-app-icons.py
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build -- --base=./
      - run: node scripts/prepare-packaged-build.mjs
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Place game inside Android app
        run: |
          rm -rf android-app/app/src/main/assets/www
          mkdir -p android-app/app/src/main/assets/www
          cp -R dist/. android-app/app/src/main/assets/www/
          mkdir -p android-app/app/src/main/res/drawable
          cp public/icons/app-icon-512.png android-app/app/src/main/res/drawable/app_icon.png
      - name: Build APK
        shell: bash
        run: |
          set +e
          gradle -p android-app assembleDebug --no-daemon > android-build.log 2>&1
          status=$?
          tail -n 140 android-build.log
          exit $status
      - name: Report Android error
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "### Erro do APK Android"
            echo '```text'
            tail -n 100 android-build.log
            echo '```'
          } > android-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body-file android-comment.md
      - run: cp android-app/app/build/outputs/apk/debug/app-debug.apk Idle-Jorneymon-Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Idle-Jorneymon-Android.apk
          if-no-files-found: error

  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pillow
      - run: python scripts/generate-app-icons.py
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build -- --base=./
      - run: node scripts/prepare-packaged-build.mjs
      - name: Place game inside Windows app
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force desktop-app/dist -ErrorAction SilentlyContinue
          Copy-Item -Recurse dist desktop-app/dist
      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm install
      - name: Build Windows installer
        working-directory: desktop-app
        shell: pwsh
        run: |
          npm run build:win *>&1 | Tee-Object -FilePath windows-build.log
          exit $LASTEXITCODE
      - name: Report Windows error
        if: failure() && github.event_name == 'pull_request'
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          "### Erro do instalador Windows" | Out-File windows-comment.md -Encoding utf8
          '```text' | Out-File windows-comment.md -Append -Encoding utf8
          Get-Content windows-build.log -Tail 100 | Out-File windows-comment.md -Append -Encoding utf8
          '```' | Out-File windows-comment.md -Append -Encoding utf8
          gh pr comment "${{ github.event.pull_request.number }}" --repo "$env:GITHUB_REPOSITORY" --body-file windows-comment.md
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop-app/release/Idle-Jorneymon-Windows-Setup.exe
          if-no-files-found: error

  publish:
    name: Publish direct downloads
    if: github.event_name != 'pull_request'
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Publish fixed download links
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view app-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit app-latest --repo "$GITHUB_REPOSITORY" --title "Idle Jorneymon - Download" --notes "APK Android e instalador Windows."
          else
            gh release create app-latest --repo "$GITHUB_REPOSITORY" --target main --title "Idle Jorneymon - Download" --notes "APK Android e instalador Windows."
          fi
          gh release upload app-latest \
            release/Idle-Jorneymon-Android.apk \
            release/Idle-Jorneymon-Windows-Setup.exe \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
