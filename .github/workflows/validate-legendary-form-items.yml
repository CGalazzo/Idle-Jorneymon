name: Validate Legendary Form Items

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Testar itens, formas, save e troca de equipamento
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { FORM_ITEMS, FORM_ITEM_FORM_IDS } from './src/data/form-items-data.js';
          import { loadOfficialPokemonData, getOfficialBaseStats } from './src/data/battle-data.js';
          import { normalizePokemonInstance } from './src/data/pokemon.js';
          import { normalizeShopState } from './src/data/shop-data.js';
          import {
            buyFormItem,
            deactivateFormItem,
            equipFormItem,
            recalculateActiveFormItemForLevel,
            restoreEquippedFormItems,
            restorePersistedFormPokemon
          } from './src/systems/form-items.js';
          import { sendToStorage } from './src/systems/team.js';

          assert.equal(FORM_ITEMS.length, 8);
          assert.equal(FORM_ITEM_FORM_IDS.length, 10);
          assert.equal(FORM_ITEMS.every((item) => item.price > 20000), true);

          const expectedNames = new Map([
            [10077, 'kyogre-primal'], [10078, 'groudon-primal'], [10007, 'giratina-origin'],
            [10019, 'tornadus-therian'], [10020, 'thundurus-therian'], [10021, 'landorus-therian'],
            [10188, 'zacian-crowned'], [10189, 'zamazenta-crowned'],
            [10245, 'dialga-origin'], [10246, 'palkia-origin']
          ]);
          await Promise.all([...expectedNames].map(async ([id, name]) => {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            assert.equal(response.ok, true, `Forma ${id} não encontrada`);
            const data = await response.json();
            assert.equal(data.name, name);
          }));

          await loadOfficialPokemonData([382, 383, 641, 645, ...FORM_ITEM_FORM_IDS]);
          assert.equal(getOfficialBaseStats(10078).attack, 180);
          assert.equal(getOfficialBaseStats(10077).specialAttack, 180);

          const groudon = normalizePokemonInstance({ id: 383, name: 'Groudon', type: 'Terra', level: 70, iv: 31, uid: 'groudon', xp: 0, xpToNext: 1000 }, { heal: true });
          const backup = normalizePokemonInstance({ id: 25, name: 'Pikachu', type: 'Elétrico', level: 70, iv: 31, uid: 'backup', xp: 0, xpToNext: 1000 }, { heal: true });
          const state = {
            mode: 'exploring',
            team: [groudon, backup],
            storage: [],
            collection: { 383: { count: 1 } },
            journey: { complete: true, worldIndex: 14, completedRoutes: 150 },
            area: { environmentId: 'elite-4' },
            campaigns: null,
            log: [],
            activeTeamIndex: 0,
            shop: normalizeShopState({ coins: 100000, ownedFormItems: [], equippedFormItems: {} })
          };

          assert.equal(buyFormItem(state, 'red-orb'), true);
          assert.equal(state.shop.coins, 64000);
          assert.equal(equipFormItem(state, 'red-orb', 'groudon'), true);
          assert.equal(groudon.name, 'Groudon Primal');
          assert.equal(groudon.formItemFormId, 10078);
          assert.equal(groudon.type, 'Terra/Fogo');
          assert.equal(groudon.attack > groudon.formItemOriginal.attack, true);

          const oldBaseMaxHp = groudon.formItemOriginal.maxHp;
          groudon.level += 1;
          recalculateActiveFormItemForLevel(groudon, true);
          assert.equal(groudon.name, 'Groudon Primal');
          assert.equal(groudon.formItemOriginal.maxHp > oldBaseMaxHp, true);

          const persisted = structuredClone(groudon);
          const restoredBase = restorePersistedFormPokemon(persisted);
          const restoredShop = normalizeShopState(state.shop);
          restoreEquippedFormItems(restoredShop, [restoredBase]);
          assert.equal(restoredBase.formItemFormId, 10078);
          assert.equal(deactivateFormItem(restoredBase), true);
          assert.equal(restoredBase.name, 'Groudon');

          assert.equal(sendToStorage(state, 'groudon'), true);
          assert.equal(state.shop.equippedFormItems['red-orb'], undefined);
          assert.equal(state.storage[0].name, 'Groudon');

          const tornadus = normalizePokemonInstance({ id: 641, name: 'Tornadus', type: 'Voador', level: 70, iv: 31, uid: 'tornadus', xp: 0, xpToNext: 1000 }, { heal: true });
          const landorus = normalizePokemonInstance({ id: 645, name: 'Landorus', type: 'Terra/Voador', level: 70, iv: 31, uid: 'landorus', xp: 0, xpToNext: 1000 }, { heal: true });
          state.team = [tornadus, landorus];
          state.storage = [];
          state.shop = normalizeShopState({ ownedFormItems: ['reveal-glass'], equippedFormItems: {} });
          assert.equal(equipFormItem(state, 'reveal-glass', 'tornadus'), true);
          assert.equal(tornadus.formItemFormId, 10019);
          assert.equal(equipFormItem(state, 'reveal-glass', 'landorus'), true);
          assert.equal(tornadus.isFormItemActive, undefined);
          assert.equal(landorus.formItemFormId, 10021);
          assert.equal(state.shop.equippedFormItems['reveal-glass'], 'landorus');
          NODE
